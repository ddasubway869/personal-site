<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ARVL</title>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png"/>
  <meta name="theme-color" content="#0d0d0d" media="(prefers-color-scheme: dark)"/>
  <meta name="theme-color" content="#f5f5f3" media="(prefers-color-scheme: light)"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="ARVL"/>
  <link rel="stylesheet" href="/style.css?v=115"/>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/sw.js").catch(() => {});
    }
  </script>
</head>
<body>
  <header id="site-header"></header>
  <main class="page-container" id="page-main">
    <p class="ap-loading">Loading…</p>
  </main>
  <script src="/js/common.js?v=4"></script>
  <script>
  'use strict';

  const username = decodeURIComponent(location.pathname.split('/u/')[1] || '');

  const SUBGENRES = {
    'Hip-Hop':        ['Trap', 'Boom Bap', 'G-Funk', 'Drill', 'Conscious Rap', 'Mumble Rap', 'Lo-Fi Hip-Hop', 'Jazz Rap', 'Southern Rap', 'Crunk', 'Bounce', 'Emo Rap', 'Alternative', 'Experimental', 'Chillhop'],
    'R&B / Soul':     ['Contemporary R&B', 'Neo-Soul', 'New Jack Swing', 'Hip-Hop Soul', 'Trap-Soul', 'Alternative R&B', 'Doo-Wop'],
    'Pop':            ['Pop Rock', 'Electropop', 'Synth-Pop', 'Teen Pop', 'Dance-Pop', 'Disco-Pop', 'Indie Pop', 'Pop-R&B', 'Bedroom Pop', 'Traditional Pop', 'Psychedelic Pop'],
    'Rock':           ['Classic Rock', 'Hard Rock', 'Punk Rock', 'Grunge', 'Post-Grunge', 'Alternative Rock', 'Indie Rock', 'Pop-Punk', 'Progressive Rock', 'Glam Rock', 'Electronic Rock', 'Post-Punk', 'New Wave', 'Shoegaze', 'Dream Pop', 'Math Rock'],
    'Electronic':     ['House', 'Techno', 'Dubstep', 'Drum n Bass', 'Trance', 'Hardstyle', 'Trip-Hop', 'Downtempo', 'Experimental', 'Electro & Fusion'],
    'Jazz':           ['Dixieland', 'Swing', 'Bebop', 'Cool Jazz', 'Hard Bop', 'Modal Jazz', 'Jazz Fusion', 'Smooth Jazz', 'Latin Jazz', 'Free Jazz', 'Neo-Bop', 'Spiritual Jazz'],
    'Metal':          ['Thrash Metal', 'Death Metal', 'Black Metal', 'Progressive Metal', 'Metalcore', 'Groove Metal', 'Symphonic Metal', 'Nu Metal', 'Blackened Deathcore', 'Djent'],
    'Classical':      ['Baroque', 'Classical', 'Romantic', 'Modernism & Avant-Garde', 'Minimalism', 'Contemporary Classical'],
    'Folk & Country': ['Folk Rock', 'Indie Folk', 'Celtic Folk', 'Bluegrass', 'Anti-Folk', 'Folk Metal', 'Americana', 'Outlaw Country', 'Country Pop', 'Bro-Country', 'Red Dirt', 'Nashville Sound', 'Honky-Tonk'],
    'World':          ['Afrobeats', 'Reggaeton', 'Salsa', 'Bachata', 'Regional Mexican', 'Bongo Flava', 'Worldbeat', 'K-Pop', 'Brazil', 'Africa', 'Asia'],
    'Ambient':        ['Dark Ambient', 'Drone', 'Nature Sounds', 'Space Ambient', 'Neo-Classical Ambient', 'Ambient Electronic'],
    'Blues':          ['Delta Blues', 'Chicago Blues', 'Texas Blues', 'Piedmont Blues', 'Jump Blues', 'Swamp Blues', 'Soul Blues', 'British Blues'],
  };

  // ── Popover state (module-level so wireOverlayCard can use it) ───────────
  let _pop = null;
  const closePop = () => { if (_pop) { _pop.remove(); _pop = null; } };

  function overlayCard(a, removeTitle) {
    const genreLabel = a.genre ? (a.genre.includes(', ') ? a.genre.split(', ')[1] : a.genre) : '';
    return `
      <div class="profile-card profile-card--crate"
           data-spotify-id="${esc(a.spotifyId)}"
           data-title="${esc(a.title)}"
           data-artist="${esc(a.artist)}">
        <div class="profile-card-cover-wrap">
          <a href="/album/${esc(a.spotifyId)}" class="profile-card-cover" ${a.coverUrl ? `style="background-image:url('${esc(a.coverUrl)}')"` : ''}></a>
          <div class="profile-card-overlay">
            <button class="profile-card-btn profile-card-play-btn" title="Stream">
              <svg viewBox="0 0 24 24" width="11" height="11" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
            </button>
            <button class="profile-card-btn profile-card-remove-btn" title="${removeTitle}">
              <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
          </div>
        </div>
        <div class="profile-card-body">
          <p class="profile-card-title">${esc(a.title)}</p>
          <p class="profile-card-artist">${esc(a.artist)}</p>
          ${genreLabel ? `<span class="genre-tag">${esc(genreLabel)}</span>` : ''}
        </div>
      </div>`;
  }

  function albumGrid(albums, type, isSelf) {
    if (!albums.length) return '<p class="cp-empty">Nothing here yet.</p>';
    return `<div class="profile-grid">${albums.map(a => {
      const genreLabel = a.genre ? (a.genre.includes(', ') ? a.genre.split(', ')[1] : a.genre) : '';
      if (type === 'crate' && isSelf) return overlayCard(a, 'Remove from Collection');
      if (type === 'later' && isSelf) return overlayCard(a, 'Remove from Listen Later');
      return `
        <a href="/album/${esc(a.spotifyId)}" class="profile-card">
          <div class="profile-card-cover" ${a.coverUrl ? `style="background-image:url('${esc(a.coverUrl)}')"` : ''}></div>
          <div class="profile-card-body">
            <p class="profile-card-title">${esc(a.title)}</p>
            <p class="profile-card-artist">${esc(a.artist)}</p>
            ${type === 'picks' && a.note ? `<p class="profile-card-note">"${esc(a.note)}"</p>` : ''}
            ${genreLabel ? `<span class="genre-tag">${esc(genreLabel)}</span>` : ''}
          </div>
        </a>`;
    }).join('')}
    </div>`;
  }

  function wireOverlayCard(card, removeUrl, removedKey, toastMsg) {
    const { spotifyId, title, artist } = card.dataset;

    card.querySelector('.profile-card-play-btn').addEventListener('click', e => {
      e.preventDefault(); e.stopPropagation();
      if (_pop) { closePop(); return; }
      const spotifyHref    = `https://open.spotify.com/album/${spotifyId}`;
      const appleMusicHref = `https://music.apple.com/us/search?term=${encodeURIComponent(title + ' ' + artist)}`;
      const tidalHref      = `https://tidal.com/search/albums?q=${encodeURIComponent(title + ' ' + artist)}`;
      const deezerHref     = `https://www.deezer.com/search/${encodeURIComponent((title + ' ' + artist).toLowerCase())}/album`;
      const rect = e.currentTarget.getBoundingClientRect();
      _pop = document.createElement('div');
      _pop.className = 'stream-popover';
      _pop.innerHTML = `
        <a class="stream-option" href="${spotifyHref}"    target="_blank" rel="noopener">Spotify</a>
        <a class="stream-option" href="${appleMusicHref}" target="_blank" rel="noopener">Apple Music</a>
        <a class="stream-option" href="${tidalHref}"      target="_blank" rel="noopener">Tidal</a>
        <a class="stream-option" href="${deezerHref}"     target="_blank" rel="noopener">Deezer</a>`;
      _pop.style.top  = `${rect.bottom + 6}px`;
      _pop.style.left = `${rect.left}px`;
      document.body.appendChild(_pop);
      setTimeout(() => document.addEventListener('click', closePop, { once: true }), 0);
    });

    card.querySelector('.profile-card-remove-btn').addEventListener('click', async e => {
      e.preventDefault(); e.stopPropagation();
      try {
        const r = await fetch(removeUrl, { method: 'POST' });
        if (!r.ok) return;
        const d = await r.json();
        if (!d[removedKey]) { card.remove(); showToast(toastMsg); }
      } catch {}
    });
  }

  function wireOverlayCards(container, type) {
    if (type === 'crate') {
      container.querySelectorAll('.profile-card--crate').forEach(card =>
        wireOverlayCard(card, `/crate/${encodeURIComponent(card.dataset.spotifyId)}`, 'inCrate', 'Removed from Collection')
      );
    } else if (type === 'later') {
      container.querySelectorAll('.profile-card--crate').forEach(card =>
        wireOverlayCard(card, `/listen-later/${encodeURIComponent(card.dataset.spotifyId)}`, 'inListenLater', 'Removed from Listen Later')
      );
    }
  }

  function initProfileFilters(albums, type, tabKey, isSelf) {
    const filterWrap  = document.getElementById(`pf-filter-${tabKey}`);
    const gridEl      = document.getElementById(`pf-grid-${tabKey}`);
    if (!filterWrap || !gridEl) return;

    const hasGenre = albums.some(a => a.genre);
    if (!hasGenre) return;

    const usedCores = [...new Set(albums.map(a => a.genre?.split(', ')[0].trim()).filter(Boolean))];

    filterWrap.innerHTML = `
      <div class="genre-filters" id="pf-filters-${tabKey}" style="margin-bottom:.5rem">
        <button class="genre-filter-btn genre-filter-btn--active" data-genre="">All</button>
        ${usedCores.map(g => `<button class="genre-filter-btn" data-genre="${esc(g)}">${esc(g)}</button>`).join('')}
      </div>
      <div class="genre-subfilters" id="pf-subfilters-${tabKey}" style="display:none;margin-bottom:.5rem"></div>
    `;

    let activeCore = '';
    let activeSub  = '';
    const filtersEl    = document.getElementById(`pf-filters-${tabKey}`);
    const subfiltersEl = document.getElementById(`pf-subfilters-${tabKey}`);

    function rerender(filtered) {
      gridEl.innerHTML = albumGrid(filtered, type, isSelf);
      wireOverlayCards(gridEl, type);
    }

    function buildSubRow(core) {
      const usedSubs = new Set(
        albums
          .filter(a => a.genre && a.genre.startsWith(core))
          .map(a => { const p = a.genre.split(', '); return p[1] || null; })
          .filter(Boolean)
      );
      return (SUBGENRES[core] || []).filter(s => usedSubs.has(s));
    }

    filtersEl.addEventListener('click', e => {
      const btn = e.target.closest('.genre-filter-btn');
      if (!btn) return;
      filtersEl.querySelectorAll('.genre-filter-btn').forEach(b => b.classList.remove('genre-filter-btn--active'));
      btn.classList.add('genre-filter-btn--active');
      activeCore = btn.dataset.genre;
      activeSub  = '';

      const subs = activeCore ? buildSubRow(activeCore) : [];
      if (subs.length) {
        subfiltersEl.innerHTML = subs.map(s =>
          `<button class="genre-filter-btn genre-filter-btn--sub" data-subgenre="${esc(s)}">${esc(s)}</button>`
        ).join('');
        subfiltersEl.style.display = 'flex';
        subfiltersEl.style.animation = 'none';
        subfiltersEl.offsetHeight;
        subfiltersEl.style.animation = '';

        subfiltersEl.querySelectorAll('.genre-filter-btn--sub').forEach(sb => {
          sb.addEventListener('click', () => {
            subfiltersEl.querySelectorAll('.genre-filter-btn--sub').forEach(b => b.classList.remove('genre-filter-btn--active'));
            if (activeSub === sb.dataset.subgenre) {
              activeSub = '';
            } else {
              sb.classList.add('genre-filter-btn--active');
              activeSub = sb.dataset.subgenre;
            }
            const filtered = activeSub
              ? albums.filter(a => a.genre && a.genre.includes(activeSub))
              : albums.filter(a => a.genre && (a.genre === activeCore || a.genre.startsWith(activeCore + ',')));
            rerender(filtered);
          });
        });
      } else {
        subfiltersEl.innerHTML = '';
        subfiltersEl.style.display = 'none';
      }

      const filtered = activeCore
        ? albums.filter(a => a.genre === activeCore || (a.genre && a.genre.startsWith(activeCore + ',')))
        : albums;
      rerender(filtered);
    });
  }

  function renderPage(data, me) {
    document.title = `${data.username || username} — ARVL`;
    const joined = data.createdAt
      ? new Date(data.createdAt * 1000).toLocaleDateString(undefined, { month: 'long', year: 'numeric' })
      : '';
    const pickCount     = (data.picks || []).length;
    const followerCount = data.followerCount ?? 0;
    const initial       = (data.username || username || '?')[0].toUpperCase();

    const _picks = data.picks       || [];
    const _crate = data.crate       || [];
    const _later = data.listenLater || [];

    const main = document.getElementById('page-main');
    main.innerHTML = `
      <div class="up-profile-header up-profile-header--page">
        <div class="up-avatar">${esc(initial)}</div>
        <div class="up-profile-info">
          <h1 class="up-username">${esc(data.username || username)}${data.isSupporter ? '<span class="supporter-star" title="ARVL Supporter">★</span>' : ''}</h1>
          <p class="up-meta">
            ${joined ? `Member since ${joined}` : ''}
            ${pickCount ? ` · ${pickCount} ${pickCount === 1 ? 'pick' : 'picks'}` : ''}
             · ${followerCount} ${followerCount === 1 ? 'follower' : 'followers'}
          </p>
        </div>
      </div>
      ${!data.isSelf && me ? `
        <button class="btn up-follow-btn${data.isFollowing ? ' up-follow-btn--following' : ''}" id="up-follow-btn">
          ${data.isFollowing ? 'Following' : 'Follow'}
        </button>` : ''}
      <nav class="ap-tabs" style="margin-top:1rem">
        <button class="ap-tab-btn ap-tab-btn--active" data-tab="picks">Picks</button>
        <button class="ap-tab-btn" data-tab="crate">Collection</button>
        <button class="ap-tab-btn" data-tab="later">Listen Later</button>
      </nav>

      <div class="ap-tab-panel" id="up-tab-picks">
        <div id="pf-filter-picks"></div>
        <div id="pf-grid-picks">${albumGrid(_picks, 'picks', data.isSelf)}</div>
      </div>
      <div class="ap-tab-panel" id="up-tab-crate" hidden>
        <div id="pf-filter-crate"></div>
        <div id="pf-grid-crate">${albumGrid(_crate, 'crate', data.isSelf)}</div>
      </div>
      <div class="ap-tab-panel" id="up-tab-later" hidden>
        <div id="pf-filter-later"></div>
        <div id="pf-grid-later">${albumGrid(_later, 'later', data.isSelf)}</div>
      </div>
    `;

    // Tab switching
    function showProfileTab(tab) {
      document.querySelectorAll('.ap-tab-btn').forEach(b => b.classList.toggle('ap-tab-btn--active', b.dataset.tab === tab));
      document.querySelectorAll('.ap-tab-panel').forEach(p => { p.hidden = (p.id !== `up-tab-${tab}`); });
    }
    document.querySelectorAll('.ap-tab-btn').forEach(btn => {
      btn.addEventListener('click', () => showProfileTab(btn.dataset.tab));
    });

    // Activate tab from ?tab= query param
    const tabParam = new URLSearchParams(location.search).get('tab');
    if (tabParam) showProfileTab(tabParam);

    // Genre filters per tab
    initProfileFilters(_picks, 'picks', 'picks', data.isSelf);
    initProfileFilters(_crate, 'crate', 'crate', data.isSelf);
    initProfileFilters(_later, 'later', 'later', data.isSelf);

    // Wire overlay cards (initial render)
    wireOverlayCards(document.getElementById('pf-grid-crate'),  'crate');
    wireOverlayCards(document.getElementById('pf-grid-later'), 'later');

    // Follow button
    document.getElementById('up-follow-btn')?.addEventListener('click', async () => {
      const btn = document.getElementById('up-follow-btn');
      const r = await fetch(`/u/${encodeURIComponent(username)}/follow`, { method: 'POST' });
      if (!r.ok) return;
      const d = await r.json();
      btn.textContent = d.following ? 'Following' : 'Follow';
      btn.classList.toggle('up-follow-btn--following', d.following);
    });
  }

  (async () => {
    const me = await initHeader({ active: null });
    try {
      const r = await fetch(`/u/${encodeURIComponent(username)}`, {
        headers: { 'Accept': 'application/json' }
      });
      if (!r.ok) { document.getElementById('page-main').innerHTML = '<p class="cp-empty">User not found.</p>'; return; }
      const data = await r.json();
      renderPage(data, me);
    } catch {
      document.getElementById('page-main').innerHTML = '<p class="cp-empty">Failed to load profile.</p>';
    }
  })();
  </script>
</body>
</html>

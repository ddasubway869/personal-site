<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ARVL</title>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png"/>
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png"/>
  <meta name="theme-color" content="#0d0d0d" media="(prefers-color-scheme: dark)"/>
  <meta name="theme-color" content="#f5f5f3" media="(prefers-color-scheme: light)"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="ARVL"/>
  <link rel="stylesheet" href="/style.css?v=136"/>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/sw.js").catch(() => {});
    }
  </script>
</head>
<body>
  <header id="site-header"></header>
  <main class="page-container" id="page-main">
    <p class="ap-loading">Loading…</p>
  </main>
  <script src="/js/common.js?v=8"></script>
  <script>
  'use strict';

  const username = decodeURIComponent(location.pathname.split('/u/')[1] || '');

  const SUBGENRES = {
    'Hip-Hop':        ['Trap', 'Boom Bap', 'G-Funk', 'Drill', 'Conscious Rap', 'Mumble Rap', 'Lo-Fi Hip-Hop', 'Jazz Rap', 'Southern Rap', 'Crunk', 'Bounce', 'Emo Rap', 'Alternative', 'Experimental', 'Chillhop'],
    'R&B / Soul':     ['Contemporary R&B', 'Neo-Soul', 'New Jack Swing', 'Hip-Hop Soul', 'Trap-Soul', 'Alternative R&B', 'Doo-Wop'],
    'Pop':            ['Pop Rock', 'Electropop', 'Synth-Pop', 'Teen Pop', 'Dance-Pop', 'Disco-Pop', 'Indie Pop', 'Pop-R&B', 'Bedroom Pop', 'Traditional Pop', 'Psychedelic Pop'],
    'Rock':           ['Classic Rock', 'Hard Rock', 'Grunge', 'Post-Grunge', 'Alternative Rock', 'Indie Rock', 'Pop-Punk', 'Progressive Rock', 'Glam Rock', 'Electronic Rock', 'New Wave', 'Shoegaze', 'Dream Pop', 'Math Rock'],
    'Electronic':     ['House', 'Techno', 'Dubstep', 'Drum n Bass', 'Trance', 'Hardstyle', 'Trip-Hop', 'Downtempo', 'Experimental', 'Electro & Fusion', 'Folktronica'],
    'Jazz':           ['Dixieland', 'Swing', 'Bebop', 'Cool Jazz', 'Hard Bop', 'Modal Jazz', 'Fusion', 'Smooth Jazz', 'Latin Jazz', 'Free Jazz', 'Neo-Bop', 'Spiritual Jazz'],
    'Metal':          ['Thrash Metal', 'Death Metal', 'Black Metal', 'Progressive Metal', 'Metalcore', 'Groove Metal', 'Symphonic Metal', 'Nu Metal', 'Blackened Deathcore', 'Djent'],
    'Classical':      ['Baroque', 'Classical', 'Romantic', 'Modernism & Avant-Garde', 'Minimalism', 'Contemporary Classical'],
    'Folk & Country': ['Folk Rock', 'Indie Folk', 'Celtic Folk', 'Bluegrass', 'Anti-Folk', 'Folk Metal', 'Americana', 'Outlaw Country', 'Country Pop', 'Bro-Country', 'Red Dirt', 'Nashville Sound', 'Honky-Tonk'],
    'World':          ['Afrobeats', 'Reggaeton', 'Salsa', 'Bachata', 'Regional Mexican', 'Bongo Flava', 'Worldbeat', 'K-Pop', 'Brazil', 'Africa', 'Asia'],
    'Ambient':        ['Dark Ambient', 'Drone', 'Nature Sounds', 'Space Ambient', 'Neo-Classical Ambient', 'Ambient Electronic'],
    'Blues':          ['Delta Blues', 'Chicago Blues', 'Texas Blues', 'Piedmont Blues', 'Jump Blues', 'Swamp Blues', 'Soul Blues', 'British Blues'],
    'Punk':           ['Hardcore', 'Post-Hardcore', 'Post-Punk', 'Goth', 'Crust Punk', 'Horror Punk', 'Pop-Punk', 'Emo', 'Skate Punk', 'Street Punk', 'Anarcho-Punk', 'Psychobilly'],
  };

  // ── Popover state (module-level so wireOverlayCard can use it) ───────────
  let _pop = null;
  const closePop = () => { if (_pop) { _pop.remove(); _pop = null; } };

  function overlayCard(a, removeTitle) {
    const genreLabel = a.genre ? (a.genre.includes(', ') ? a.genre.split(', ')[1] : a.genre) : '';
    return `
      <div class="profile-card profile-card--crate"
           data-spotify-id="${esc(a.spotifyId)}"
           data-title="${esc(a.title)}"
           data-artist="${esc(a.artist)}">
        <div class="profile-card-cover-wrap">
          <a href="/album/${esc(a.spotifyId)}" class="profile-card-cover" ${a.coverUrl ? `style="background-image:url('${esc(a.coverUrl)}')"` : ''}></a>
          <div class="profile-card-overlay">
            <button class="profile-card-btn profile-card-play-btn" title="Stream">
              <svg viewBox="0 0 24 24" width="11" height="11" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
            </button>
            <button class="profile-card-btn profile-card-remove-btn" title="${removeTitle}">
              <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
          </div>
          <button class="profile-card-mobile-btn">···</button>
        </div>
        <div class="profile-card-body">
          <p class="profile-card-title">${esc(a.title)}</p>
          <p class="profile-card-artist">${esc(a.artist)}</p>
          ${genreLabel ? `<span class="genre-tag">${esc(genreLabel)}</span>` : ''}
        </div>
      </div>`;
  }

  function albumGrid(albums, type, isSelf) {
    if (!albums.length) return '<p class="cp-empty">Nothing here yet.</p>';
    return `<div class="profile-grid">${albums.map(a => {
      const genreLabel = a.genre ? (a.genre.includes(', ') ? a.genre.split(', ')[1] : a.genre) : '';
      if (type === 'crate' && isSelf) return overlayCard(a, 'Remove from Collection');
      if (type === 'later' && isSelf) return overlayCard(a, 'Remove from Listen Later');
      return `
        <a href="/album/${esc(a.spotifyId)}" class="profile-card">
          <div class="profile-card-cover" ${a.coverUrl ? `style="background-image:url('${esc(a.coverUrl)}')"` : ''}></div>
          <div class="profile-card-body">
            <p class="profile-card-title">${esc(a.title)}</p>
            <p class="profile-card-artist">${esc(a.artist)}</p>
            ${type === 'picks' && a.note ? `<p class="profile-card-note">"${esc(a.note)}"</p>` : ''}
            ${genreLabel ? `<span class="genre-tag">${esc(genreLabel)}</span>` : ''}
          </div>
        </a>`;
    }).join('')}
    </div>`;
  }

  function wireOverlayCard(card, removeUrl, removedKey, toastMsg, actionLabel) {
    const { spotifyId, title, artist } = card.dataset;

    card.querySelector('.profile-card-play-btn').addEventListener('click', e => {
      e.preventDefault(); e.stopPropagation();
      if (_pop) { closePop(); return; }
      const _isDz = String(spotifyId).startsWith('dz_');
      const _q    = encodeURIComponent(title + ' ' + artist);
      const spotifyHref    = _isDz ? `https://open.spotify.com/search/${_q}` : `https://open.spotify.com/album/${spotifyId}`;
      const appleMusicHref = `https://music.apple.com/us/search?term=${encodeURIComponent(title + ' ' + artist)}`;
      const tidalHref      = `https://tidal.com/search/albums?q=${encodeURIComponent(title + ' ' + artist)}`;
      const deezerHref     = `https://www.deezer.com/search/${encodeURIComponent((title + ' ' + artist).toLowerCase())}/album`;
      const rect = e.currentTarget.getBoundingClientRect();
      _pop = document.createElement('div');
      _pop.className = 'stream-popover';
      _pop.innerHTML = `
        <a class="stream-option" href="${spotifyHref}"    target="_blank" rel="noopener">Spotify</a>
        <a class="stream-option" href="${appleMusicHref}" target="_blank" rel="noopener">Apple Music</a>
        <a class="stream-option" href="${tidalHref}"      target="_blank" rel="noopener">Tidal</a>
        <a class="stream-option" href="${deezerHref}"     target="_blank" rel="noopener">Deezer</a>
        <a class="stream-option" href="https://play.qobuz.com/search" target="_blank" rel="noopener">Qobuz</a>`;
      _pop.style.top  = `${rect.bottom + 6}px`;
      _pop.style.left = `${rect.left}px`;
      document.body.appendChild(_pop);
      setTimeout(() => document.addEventListener('click', closePop, { once: true }), 0);
    });

    card.querySelector('.profile-card-remove-btn').addEventListener('click', async e => {
      e.preventDefault(); e.stopPropagation();
      try {
        const r = await fetch(removeUrl, { method: 'POST' });
        if (!r.ok) return;
        const d = await r.json();
        if (!d[removedKey]) { card.remove(); showToast(toastMsg); }
      } catch {}
    });

    const mobileBtn = card.querySelector('.profile-card-mobile-btn');
    if (mobileBtn) {
      mobileBtn.addEventListener('click', e => {
        e.preventDefault(); e.stopPropagation();
        if (typeof window._openPcSheet === 'function') {
          window._openPcSheet(
            { spotifyId, title, artist, coverUrl: card.querySelector('.profile-card-cover')?.style.backgroundImage.slice(5, -2) || '' },
            async () => {
              try {
                const r = await fetch(removeUrl, { method: 'POST' });
                if (!r.ok) return;
                const d = await r.json();
                if (!d[removedKey]) { card.remove(); showToast(toastMsg); }
              } catch {}
            },
            actionLabel || toastMsg
          );
        }
      });
    }
  }

  function wireOverlayCards(container, type) {
    if (type === 'crate') {
      container.querySelectorAll('.profile-card--crate').forEach(card =>
        wireOverlayCard(card, `/crate/${encodeURIComponent(card.dataset.spotifyId)}`, 'inCrate', 'Removed from Collection', 'Remove from Collection')
      );
    } else if (type === 'later') {
      container.querySelectorAll('.profile-card--crate').forEach(card =>
        wireOverlayCard(card, `/listen-later/${encodeURIComponent(card.dataset.spotifyId)}`, 'inListenLater', 'Removed from Listen Later', 'Remove from Listen Later')
      );
    }
  }

  function initTabControls(albums, type, tabKey, isSelf) {
    const filterWrap = document.getElementById(`pf-filter-${tabKey}`);
    const gridEl     = document.getElementById(`pf-grid-${tabKey}`);
    if (!filterWrap || !gridEl) return;

    const hasGenre  = albums.some(a => a.genre);
    const usedCores = hasGenre
      ? [...new Set(albums.map(a => a.genre?.split(', ')[0].trim()).filter(Boolean))]
      : [];

    filterWrap.innerHTML = `
      <div class="ap-toolbar">
        <input type="search" class="ap-search" placeholder="Search albums or artists…" aria-label="Search" />
        <div class="ap-sort-btns">
          <button class="ap-sort-btn ap-sort-btn--active" data-sort="date">Date Added</button>
          <button class="ap-sort-btn" data-sort="title">A-Z</button>
          <button class="ap-sort-btn" data-sort="artist">Artist</button>
        </div>
      </div>
      ${hasGenre ? `
        <div class="genre-filters" id="pf-filters-${tabKey}" style="margin-bottom:.5rem">
          <button class="genre-filter-btn genre-filter-btn--active" data-genre="">All</button>
          ${usedCores.map(g => `<button class="genre-filter-btn" data-genre="${esc(g)}">${esc(g)}</button>`).join('')}
        </div>
        <div class="genre-subfilters" id="pf-subfilters-${tabKey}" style="display:none;margin-bottom:.5rem"></div>
      ` : ''}
    `;

    let searchQ    = '';
    let sortBy     = 'date';
    let activeCore = '';
    let activeSub  = '';

    function getFiltered() {
      let result = albums;
      if (searchQ) {
        const q = searchQ.toLowerCase();
        result = result.filter(a =>
          a.title.toLowerCase().includes(q) || a.artist.toLowerCase().includes(q)
        );
      }
      if (activeCore) {
        result = result.filter(a => a.genre === activeCore || (a.genre && a.genre.startsWith(activeCore + ',')));
        if (activeSub) result = result.filter(a => a.genre && a.genre.includes(activeSub));
      }
      if (sortBy === 'title')  result = [...result].sort((a, b) => a.title.localeCompare(b.title));
      if (sortBy === 'artist') result = [...result].sort((a, b) => a.artist.localeCompare(b.artist));
      return result;
    }

    function rerender() {
      const filtered = getFiltered();
      gridEl.innerHTML = albumGrid(filtered, type, isSelf);
      wireOverlayCards(gridEl, type);
    }

    // Search
    let _searchTimer;
    filterWrap.querySelector('.ap-search').addEventListener('input', e => {
      clearTimeout(_searchTimer);
      _searchTimer = setTimeout(() => { searchQ = e.target.value.trim(); rerender(); }, 200);
    });

    // Sort
    filterWrap.querySelectorAll('.ap-sort-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        filterWrap.querySelectorAll('.ap-sort-btn').forEach(b => b.classList.remove('ap-sort-btn--active'));
        btn.classList.add('ap-sort-btn--active');
        sortBy = btn.dataset.sort;
        rerender();
      });
    });

    if (!hasGenre) return;

    const filtersEl    = document.getElementById(`pf-filters-${tabKey}`);
    const subfiltersEl = document.getElementById(`pf-subfilters-${tabKey}`);

    function buildSubRow(core) {
      const usedSubs = new Set(
        albums
          .filter(a => a.genre && a.genre.startsWith(core))
          .map(a => { const p = a.genre.split(', '); return p[1] || null; })
          .filter(Boolean)
      );
      return (SUBGENRES[core] || []).filter(s => usedSubs.has(s));
    }

    filtersEl.addEventListener('click', e => {
      const btn = e.target.closest('.genre-filter-btn');
      if (!btn) return;
      filtersEl.querySelectorAll('.genre-filter-btn').forEach(b => b.classList.remove('genre-filter-btn--active'));
      btn.classList.add('genre-filter-btn--active');
      activeCore = btn.dataset.genre;
      activeSub  = '';

      const subs = activeCore ? buildSubRow(activeCore) : [];
      if (subs.length) {
        subfiltersEl.innerHTML = subs.map(s =>
          `<button class="genre-filter-btn genre-filter-btn--sub" data-subgenre="${esc(s)}">${esc(s)}</button>`
        ).join('');
        subfiltersEl.style.display = 'flex';
        subfiltersEl.querySelectorAll('.genre-filter-btn--sub').forEach(sb => {
          sb.addEventListener('click', () => {
            subfiltersEl.querySelectorAll('.genre-filter-btn--sub').forEach(b => b.classList.remove('genre-filter-btn--active'));
            if (activeSub === sb.dataset.subgenre) {
              activeSub = '';
            } else {
              sb.classList.add('genre-filter-btn--active');
              activeSub = sb.dataset.subgenre;
            }
            rerender();
          });
        });
      } else {
        subfiltersEl.innerHTML = '';
        subfiltersEl.style.display = 'none';
      }
      rerender();
    });
  }

  function renderPage(data, me) {
    document.title = `${data.username || username} — ARVL`;
    const joined = data.createdAt
      ? new Date(data.createdAt * 1000).toLocaleDateString(undefined, { month: 'long', year: 'numeric' })
      : '';
    const followerCount  = data.followerCount  ?? 0;
    const followingCount = data.followingCount ?? 0;
    const initial        = (data.username || username || '?')[0].toUpperCase();

    const _picks = data.picks       || [];
    const _crate = data.crate       || [];
    const _later = data.listenLater || [];

    // Top genres from picks — up to 3 most common
    const genreCounts = {};
    _picks.forEach(p => {
      if (!p.genre) return;
      const core = p.genre.split(', ')[0].trim();
      genreCounts[core] = (genreCounts[core] || 0) + 1;
    });
    const topGenres = Object.entries(genreCounts)
      .sort((a, b) => b[1] - a[1])
      .slice(0, 3)
      .map(([g]) => g);

    // Current week's pick (Monday-keyed)
    const _now = new Date();
    const _mon = new Date(_now);
    _mon.setUTCDate(_now.getUTCDate() - ((_now.getUTCDay() + 6) % 7));
    const currentWeekKey = _mon.toISOString().split('T')[0];
    const weekPick = _picks.find(p => p.weekKey === currentWeekKey) || _picks[0] || null;

    const main = document.getElementById('page-main');
    main.innerHTML = `
      <div class="up-hero">
        <div class="up-hero-left">
          <div class="up-hero-avatar">${esc(initial)}</div>
          <div class="up-hero-info">
            <div class="up-hero-top">
              <h1 class="up-hero-name">${esc(data.username || username)}${data.isSupporter ? '<span class="supporter-star" title="ARVL Supporter">★</span>' : ''}</h1>
              ${!data.isSelf && me ? `
                <button class="btn up-follow-btn${data.isFollowing ? ' up-follow-btn--following' : ''}" id="up-follow-btn">
                  ${data.isFollowing ? 'Following' : 'Follow'}
                </button>` : ''}
            </div>
            ${data.bio ? `<p class="up-hero-bio">${esc(data.bio)}</p>` : ''}
            ${joined ? `<p class="up-hero-since">Member since ${joined}</p>` : ''}
            ${topGenres.length ? `<div class="up-hero-genres">${topGenres.map(g => `<span class="up-genre-pill">${esc(g)}</span>`).join('')}</div>` : ''}
          </div>
        </div>
        <div class="up-hero-stats">
          <div class="up-stat"><span class="up-stat-num">${_picks.length}</span><span class="up-stat-label">Picks</span></div>
          <div class="up-stat"><span class="up-stat-num">${_crate.length}</span><span class="up-stat-label">Saved</span></div>
          <div class="up-stat"><span class="up-stat-num">${followingCount}</span><span class="up-stat-label">Following</span></div>
        </div>
      </div>

      ${weekPick ? `
      <div class="up-shelf-row">
        ${weekPick ? `
        <div class="up-shelf-col up-shelf-col--week-pick">
          <p class="up-featured-label">This Week's Pick</p>
          <a href="/album/${esc(weekPick.spotifyId)}" class="up-week-pick">
            <div class="up-week-pick-cover" ${weekPick.coverUrl ? `style="background-image:url('${esc(weekPick.coverUrl)}')"` : ''}></div>
            <div class="up-week-pick-info">
              <p class="up-week-pick-title">${esc(weekPick.title)}</p>
              <p class="up-week-pick-artist">${esc(weekPick.artist)}${weekPick.releaseYear ? `<span class="up-week-pick-year"> · ${esc(String(weekPick.releaseYear))}</span>` : ''}</p>
              ${weekPick.note ? `<p class="up-week-pick-note">"${esc(weekPick.note)}"</p>` : ''}
            </div>
          </a>
        </div>` : ''}

      </div>` : ''}

      <nav class="ap-tabs" style="margin-top:0">
        <button class="ap-tab-btn ap-tab-btn--active" data-tab="picks">Picks <span class="ap-tab-count">${_picks.length}</span></button>
        <button class="ap-tab-btn" data-tab="crate">Collection <span class="ap-tab-count">${_crate.length}</span></button>
        <button class="ap-tab-btn" data-tab="later">Listen Later <span class="ap-tab-count">${_later.length}</span></button>
      </nav>

      <div class="ap-tab-panel" id="up-tab-picks">
        <div id="pf-filter-picks"></div>
        <div id="pf-grid-picks">${albumGrid(_picks, 'picks', data.isSelf)}</div>
      </div>
      <div class="ap-tab-panel" id="up-tab-crate" hidden>
        <div id="pf-filter-crate"></div>
        <div id="pf-grid-crate">${albumGrid(_crate, 'crate', data.isSelf)}</div>
      </div>
      <div class="ap-tab-panel" id="up-tab-later" hidden>
        <div id="pf-filter-later"></div>
        <div id="pf-grid-later">${albumGrid(_later, 'later', data.isSelf)}</div>
      </div>
    `;

    // Tab switching
    function showProfileTab(tab) {
      document.querySelectorAll('.ap-tab-btn').forEach(b => b.classList.toggle('ap-tab-btn--active', b.dataset.tab === tab));
      document.querySelectorAll('.ap-tab-panel').forEach(p => { p.hidden = (p.id !== `up-tab-${tab}`); });
    }
    document.querySelectorAll('.ap-tab-btn').forEach(btn => {
      btn.addEventListener('click', () => showProfileTab(btn.dataset.tab));
    });

    // Activate tab from ?tab= query param
    const tabParam = new URLSearchParams(location.search).get('tab');
    if (tabParam) showProfileTab(tabParam);

    // Tab controls (search, sort, genre filters) per tab
    initTabControls(_picks, 'picks', 'picks', data.isSelf);
    initTabControls(_crate, 'crate', 'crate', data.isSelf);
    initTabControls(_later, 'later', 'later', data.isSelf);

    // Wire overlay cards (initial render)
    wireOverlayCards(document.getElementById('pf-grid-crate'),  'crate');
    wireOverlayCards(document.getElementById('pf-grid-later'), 'later');

    // Follow button
    document.getElementById('up-follow-btn')?.addEventListener('click', async function() {
      const r = await fetch(`/u/${encodeURIComponent(username)}/follow`, { method: 'POST' });
      if (!r.ok) return;
      const d = await r.json();
      this.textContent = d.following ? 'Following' : 'Follow';
      this.classList.toggle('up-follow-btn--following', d.following);
    });
  }

  (async () => {
    const me = await initHeader({ active: 'profile' });
    try {
      const r = await fetch(`/u/${encodeURIComponent(username)}`, {
        headers: { 'Accept': 'application/json' }
      });
      if (!r.ok) { document.getElementById('page-main').innerHTML = '<p class="cp-empty">User not found.</p>'; return; }
      const data = await r.json();
      renderPage(data, me);

    } catch {
      document.getElementById('page-main').innerHTML = '<p class="cp-empty">Failed to load profile.</p>';
    }
  })();
  </script>

  <!-- ── Profile card action sheet (mobile) ──────────────── -->
  <div class="sr-sheet-overlay" id="pc-sheet-overlay" hidden></div>
  <div class="sr-sheet" id="pc-sheet" hidden>
    <div class="sr-sheet-drag"></div>
    <div class="sr-sheet-album" id="pc-sheet-album"></div>
    <div class="sr-sheet-actions">
      <button class="sr-sheet-btn" id="pc-sheet-stream">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
        Stream
      </button>
      <button class="sr-sheet-btn" id="pc-sheet-remove">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>
        <span id="pc-sheet-remove-label">Remove</span>
      </button>
    </div>
    <button class="sr-sheet-cancel-btn" id="pc-sheet-cancel">Cancel</button>
  </div>

  <script>
  (() => {
    let _pcSheetAlbum = null;
    let _pcSheetRemoveFn = null;

    function openPcSheet(album, removeFn, removeLabel) {
      _pcSheetAlbum  = album;
      _pcSheetRemoveFn = removeFn;
      document.getElementById('pc-sheet-remove-label').textContent = removeLabel;
      const bg = album.coverUrl ? `style="background-image:url('${album.coverUrl}')"` : '';
      document.getElementById('pc-sheet-album').innerHTML = `
        <div class="sr-sheet-art" ${bg}></div>
        <div class="sr-sheet-meta">
          <p class="sr-sheet-title">${album.title}</p>
          <p class="sr-sheet-artist">${album.artist}</p>
        </div>`;
      const overlay = document.getElementById('pc-sheet-overlay');
      const sheet   = document.getElementById('pc-sheet');
      overlay.hidden = false; sheet.hidden = false;
      requestAnimationFrame(() => requestAnimationFrame(() => sheet.classList.add('sr-sheet--open')));
    }

    function closePcSheet() {
      const sheet   = document.getElementById('pc-sheet');
      const overlay = document.getElementById('pc-sheet-overlay');
      sheet.classList.remove('sr-sheet--open');
      sheet.addEventListener('transitionend', () => {
        sheet.hidden = true; overlay.hidden = true;
        _pcSheetAlbum = null; _pcSheetRemoveFn = null;
      }, { once: true });
    }

    document.getElementById('pc-sheet-overlay').addEventListener('click', closePcSheet);
    document.getElementById('pc-sheet-cancel').addEventListener('click', closePcSheet);

    document.getElementById('pc-sheet-stream').addEventListener('click', () => {
      if (!_pcSheetAlbum) return;
      closePcSheet();
      const { spotifyId, title, artist } = _pcSheetAlbum;
      const _isDz = String(spotifyId).startsWith('dz_');
      const _q = encodeURIComponent(title + ' ' + artist);
      const href = _isDz ? `https://open.spotify.com/search/${_q}` : `https://open.spotify.com/album/${spotifyId}`;
      setTimeout(() => window.open(href, '_blank', 'noopener'), 200);
    });

    document.getElementById('pc-sheet-remove').addEventListener('click', () => {
      const fn = _pcSheetRemoveFn;
      closePcSheet();
      if (fn) setTimeout(fn, 300);
    });

    window._openPcSheet = openPcSheet;
  })();
  </script>
</body>
</html>

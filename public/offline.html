<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ARVL — Offline</title>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png"/>
  <meta name="theme-color" content="#0d0d0d" media="(prefers-color-scheme: dark)"/>
  <meta name="theme-color" content="#f5f5f3" media="(prefers-color-scheme: light)"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="ARVL"/>
  <link rel="stylesheet" href="/style.css?v=114"/>
  <script>(function(){if(localStorage.getItem('theme')==='light')document.documentElement.classList.replace('dark','light')})();</script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/sw.js").catch(() => {});
    }
  </script>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="/" class="brand">ARVL</a>
    </div>
  </header>
  <main style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;gap:1rem;text-align:center;padding:2rem">
    <p style="font-size:2.5rem">📡</p>
    <h1 style="font-size:1.25rem;font-weight:600;margin:0">You're offline</h1>
    <p style="color:var(--muted);font-size:.875rem;margin:0">Check your connection and try again.</p>
    <button class="btn btn-solid" onclick="location.reload()" style="margin-top:.5rem">Retry</button>
  </main>
</body>
</html>
